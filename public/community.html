<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community / 社区</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #0d0f1a;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      user-select: none;
    }
    .card {
      text-align: center;
      padding: 32px;
      max-width: 440px;
      width: 100%;
    }
    .title {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #fff, #aeb5d0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .desc {
      color: #8b92b0;
      font-size: 0.85rem;
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .qr-row {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .qr-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .qr-img {
      width: 150px;
      height: 150px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      object-fit: cover;
      background: #fff;
    }
    .qr-label {
      color: #8b92b0;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .footer {
      color: #8b92b0;
      font-size: 0.8rem;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">Community / 社区</h1>
    <p class="desc">
      Bug 反馈 · 功能建议 · 交流讨论<br />
      Bug reports · Feature requests · Discussion
    </p>
    <div class="qr-row">
      <div class="qr-card">
        <img src="/qq.jpg" alt="QQ Group" class="qr-img" />
        <span class="qr-label">QQ 群</span>
      </div>
      <div class="qr-card">
        <img src="/discord.png" alt="Discord" class="qr-img" />
        <span class="qr-label">Discord</span>
      </div>
    </div>
    <p class="footer">
      扫码加入，一起交流！<br />
      Scan to join the community!
    </p>
  </div>
</body>
</html>
